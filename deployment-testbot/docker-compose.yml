# docker-compose.yml — builds the OpenObserve SUT from source for testbot.
# OpenObserve facts (verified 2026-06-23):
#   Dockerfile:  deploy/build/Dockerfile  (multi-stage: web build + cargo --release)
#   Context:     repo root (Dockerfile does `COPY . /openobserve` + `COPY ./web`)
#   Port:        5080 (ZO_HTTP_PORT default; binary serves API + embedded web UI)
#   Health:      GET /healthz  -> 200 {"status":"ok"}  (no auth)
#   Default org: "default"  (routes are /api/{org_id}/...)
#   Root creds:  ZO_ROOT_USER_EMAIL / ZO_ROOT_USER_PASSWORD (HTTP Basic on /api)
#   OpenAPI:     /api-doc/openapi.json  (needs ZO_SWAGGER_ENABLED=true)
#
# NOTE: the from-source build is heavy (large Rust workspace release build + an
# 8GB-memory Vue build). This is the known runtime risk for the baseline.
#
# UPSTREAM_CHECKOUT: path to the cloned OpenObserve source tree.
# Defaults to ../  (one level up from deployment-testbot/, i.e. the repo root).
services:
  openobserve:
    build:
      context: ${UPSTREAM_CHECKOUT:-../}
      dockerfile: deploy/build/Dockerfile
    container_name: openobserve-testb
    ports:
      - "5080:5080"
    environment:
      - ZO_ROOT_USER_EMAIL=root@example.com
      - ZO_ROOT_USER_PASSWORD=Complexpass#123
      - ZO_LOCAL_MODE=true
      - ZO_HTTP_PORT=5080
      - ZO_HTTP_ADDR=0.0.0.0
      - ZO_DATA_DIR=/data/
      - ZO_SWAGGER_ENABLED=true
      - RUST_LOG=info
