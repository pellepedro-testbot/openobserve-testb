# docker-compose.yml — OpenObserve SUT for testbot eval.
#
# The "image: openobserve-testb:eval" tag is the stable reference used by both
# startup paths in setup.sh:
#   CI:    setup.sh pulls openobserve/openobserve:v0.91.0 and tags it openobserve-testb:eval
#   Local: docker compose --build produces the image and tags it openobserve-testb:eval
#
# OpenObserve facts:
#   Dockerfile:  deploy/build/Dockerfile  (web build + cargo --release; needs >16 GB)
#   Port:        5080 (ZO_HTTP_PORT; serves API + embedded web UI)
#   Health:      GET /healthz -> 200  (no auth)
#   Default org: "default"
#   OpenAPI:     /api-doc/openapi.json (ZO_SWAGGER_ENABLED=true)
services:
  openobserve:
    image: openobserve-testb:eval
    build:
      context: ${UPSTREAM_CHECKOUT:-../}
      dockerfile: deploy/build/Dockerfile
    container_name: openobserve-testb
    ports:
      - "5080:5080"
    environment:
      - ZO_ROOT_USER_EMAIL=root@example.com
      - ZO_ROOT_USER_PASSWORD=Complexpass#123
      - ZO_LOCAL_MODE=true
      - ZO_HTTP_PORT=5080
      - ZO_HTTP_ADDR=0.0.0.0
      - ZO_DATA_DIR=/data/
      - ZO_SWAGGER_ENABLED=true
      - RUST_LOG=info

