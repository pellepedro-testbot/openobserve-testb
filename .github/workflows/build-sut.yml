name: Build SUT from source (eval test)

# Builds the OpenObserve SUT from source on a standard runner with a host-memory sampler
# streaming to the log. This variant injects `--jobs 1` into the Dockerfile's cargo build to
# test whether serializing compilation lowers peak memory enough to avoid the OOM. No registry/AWS.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch or SHA). Default: main."
        required: false
        default: "main"

jobs:
  build-sut:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Limit cargo parallelism (--jobs 1) for the memory test
        run: |
          sed -i 's|cargo build --release|cargo build --release --jobs 1|' deploy/build/Dockerfile
          echo "patched cargo line:"; grep -n "cargo build" deploy/build/Dockerfile

      - name: Runner specs (before build)
        run: |
          echo "::group::runner specs"
          echo "cpus: $(nproc)"; free -h; df -h /
          echo "::endgroup::"

      - name: Build SUT from source (--jobs 1, with memory monitor)
        run: |
          mkdir -p /tmp/mem
          ( while true; do
              L="[mem $(date -u +%H:%M:%S)] $(free -m | awk '/Mem:/{printf "used=%sMB avail=%sMB ",$3,$7} /Swap:/{printf "swap_used=%sMB",$3}') load=$(cut -d' ' -f1-3 /proc/loadavg)"
              echo "$L"; echo "$L" >> /tmp/mem/mem.log
              sleep 10
            done ) &
          MON=$!
          set +e
          docker compose -f deployment-testbot/docker-compose.yml build
          RC=$?
          kill "$MON" 2>/dev/null
          echo "=== docker build exit code: $RC (137=SIGKILL/OOM, 143=SIGTERM) ==="
          echo "=== memory trace tail ==="; tail -8 /tmp/mem/mem.log
          exit "$RC"

      - name: Start SUT and health-check
        run: |
          docker compose -f deployment-testbot/docker-compose.yml up -d
          for i in $(seq 1 60); do
            if curl -sf -m 3 http://localhost:5080/healthz >/dev/null; then echo "SUT healthy"; exit 0; fi
            sleep 3
          done
          echo "SUT did not become healthy within ~3 min"; exit 1

      - name: Upload memory trace (best-effort)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-trace-jobs1
          path: /tmp/mem/mem.log
          if-no-files-found: warn
